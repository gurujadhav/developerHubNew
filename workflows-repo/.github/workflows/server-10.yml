name: "Server 10"

on:
  workflow_dispatch:
    inputs:
      project_id:
        description: "MongoDB project ID"
        required: true
        type: string
      repo_url:
        description: "GitHub repository URL (https://github.com/owner/repo)"
        required: true
        type: string
      pat:
        description: "GitHub PAT with repo read access (empty for public repos)"
        required: false
        default: ""
        type: string
      env_b64:
        description: "Base64-encoded .env file content"
        required: false
        default: ""
        type: string
      branch:
        description: "Git branch to clone"
        required: false
        default: "main"
        type: string
      run_command:
        description: "Command to start the app (composed by the platform)"
        required: false
        default: "pnpm dev"
        type: string
      ports:
        description: "Comma-separated ports the app listens on (max 5)"
        required: false
        default: "3000"
        type: string
      webhook_url:
        description: "Vercel app webhook URL for status updates"
        required: true
        type: string
      webhook_secret:
        description: "Shared secret for webhook authentication"
        required: true
        type: string
      cf_workers_key:
        description: "Cloudflare Workers API token (optional - shared tunnel if empty)"
        required: false
        default: ""
        type: string
      after_b64:
        description: "Base64 JSON {start, stop} of after-scripts"
        required: false
        default: ""
        type: string
      project_type:
        description: "Project type (express or python)"
        required: false
        default: "express"
        type: string

jobs:
  serve:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      # --- 1. Install cloudflared ---
      - name: Install cloudflared
        run: |
          sudo mkdir -p --mode=0755 /usr/share/keyrings
          curl -fsSL https://pkg.cloudflare.com/cloudflare-public-v2.gpg | sudo tee /usr/share/keyrings/cloudflare-public-v2.gpg >/dev/null
          echo 'deb [signed-by=/usr/share/keyrings/cloudflare-public-v2.gpg] https://pkg.cloudflare.com/cloudflared any main' | sudo tee /etc/apt/sources.list.d/cloudflared.list
          sudo apt-get update && sudo apt-get install -y cloudflared
          cloudflared --version

      # --- 2a. Setup Node.js (for Express projects) ---
      - name: Setup Node.js 22
        if: inputs.project_type == 'express' || inputs.project_type == ''
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # --- 2b. Setup Python (for Python projects) ---
      - name: Setup Python 3.11
        if: inputs.project_type == 'python'
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      # --- 3. pnpm (for Express projects) ---
      - name: Setup pnpm
        if: inputs.project_type == 'express' || inputs.project_type == ''
        uses: pnpm/action-setup@v4
        with:
          version: latest
          run_install: false

      # --- 4. Clone user repo ---
      - name: Clone repository
        env:
          PAT: ${{ inputs.pat }}
          REPO_URL: ${{ inputs.repo_url }}
          BRANCH: ${{ inputs.branch }}
        run: |
          # Trim stray whitespace/newlines a pasted PAT may carry, then embed it
          # only when present (public repos clone without one).
          PAT="$(printf '%s' "$PAT" | tr -d '[:space:]')"
          REPO_CLEAN=$(echo "$REPO_URL" | sed 's|https://||')
          BRANCH_CLEAN="$(printf '%s' "$BRANCH" | tr -d '[:space:]')"
          if [ -z "$BRANCH_CLEAN" ]; then
            BRANCH_CLEAN="main"
          fi
          if [ -n "$PAT" ]; then
            git clone --branch "$BRANCH_CLEAN" --depth 1 "https://${PAT}@${REPO_CLEAN}" project
          else
            git clone --branch "$BRANCH_CLEAN" --depth 1 "https://${REPO_CLEAN}" project
          fi
          echo "Cloned $REPO_URL branch $BRANCH_CLEAN"

      # --- 5a. Restore node_modules cache (Express) ---
      - name: Restore node_modules cache
        if: inputs.project_type == 'express' || inputs.project_type == ''
        id: nm-cache
        uses: actions/cache@v4
        with:
          path: project/node_modules
          key: nm-${{ inputs.project_id }}-${{ hashFiles('project/pnpm-lock.yaml', 'project/package-lock.json', 'project/yarn.lock') }}
          restore-keys: nm-${{ inputs.project_id }}-

      # --- 5b. Setup Python virtual environment (Python) ---
      - name: Setup Python virtual environment
        if: inputs.project_type == 'python'
        working-directory: project
        run: |
          python3 -m venv venv
          source venv/bin/activate
          echo "VIRTUAL_ENV=${PWD}/venv" >> $GITHUB_ENV
          echo "${PWD}/venv/bin" >> $GITHUB_PATH

      # --- 6. Write .env file ---
      - name: Write .env file
        if: inputs.env_b64 != ''
        env:
          ENV_B64: ${{ inputs.env_b64 }}
        run: |
          echo "::add-mask::$ENV_B64"
          echo "$ENV_B64" | base64 -d > project/.env
          # Ensure a trailing newline so the final variable is well-formed.
          [ -n "$(tail -c1 project/.env)" ] && printf '\n' >> project/.env
          
          # Mask each environment variable value to prevent leaks in logs
          while IFS='=' read -r key value || [ -n "$key" ]; do
            [ -z "$key" ] && continue
            [[ "$key" =~ ^# ]] && continue
            if [ -n "$value" ]; then
              value=$(echo "$value" | tr -d '\r')
              echo "::add-mask::$value"
            fi
          done < project/.env
          
          echo ".env written ($(grep -c '=' project/.env) variables, $(wc -c < project/.env) bytes)"

      # --- 7a. Install dependencies (Express) ---
      - name: Install dependencies (Express)
        if: inputs.project_type == 'express' || inputs.project_type == ''
        working-directory: project
        run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile || pnpm install
          elif [ -f package-lock.json ]; then
            npm ci || npm install
          else
            pnpm install
          fi

      # --- 7b. Install dependencies (Python) ---
      - name: Install dependencies (Python)
        if: inputs.project_type == 'python'
        working-directory: project
        run: |
          source venv/bin/activate
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          echo "Python dependencies installed"

      # --- 7b. Decode after-scripts ---
      - name: Decode after-scripts
        env:
          AFTER_B64: ${{ inputs.after_b64 }}
        run: |
          AFTER_JSON='{}'
          if [ -n "$AFTER_B64" ]; then
            AFTER_JSON=$(echo "$AFTER_B64" | base64 -d 2>/dev/null || echo '{}')
          fi
          {
            echo "AFTER_START<<__AS_EOF__"
            echo "$AFTER_JSON" | jq -r '.start // ""'
            echo "__AS_EOF__"
            echo "AFTER_STOP<<__AS_EOF__"
            echo "$AFTER_JSON" | jq -r '.stop // ""'
            echo "__AS_EOF__"
          } >> "$GITHUB_ENV"
      # --- 8. Start the application ---
      - name: Start application
        working-directory: project
        env:
          PORTS: ${{ inputs.ports }}
          RUN_CMD: ${{ inputs.run_command }}
          CF_KEY: ${{ inputs.cf_workers_key }}
        run: |
          PORTS=$(printf '%s' "$PORTS" | tr -d '[:space:]')
          IFS=',' read -ra PORT_ARR <<< "$PORTS"
          PORT_ARR=("${PORT_ARR[@]:0:5}")
          PRIMARY_PORT="${PORT_ARR[0]}"
          echo "PORTS=$PORTS" >> "$GITHUB_ENV"
          echo "Ports: ${PORT_ARR[*]} (primary: $PRIMARY_PORT)"

          # Touch the log file first so tail doesn't complain about it not existing
          touch /tmp/app.log
          tail -F /tmp/app.log &
          TAIL_PID=$!

          nohup sh -c "$RUN_CMD" > /tmp/app.log 2>&1 &
          APP_PID=$!
          echo "APP_PID=$APP_PID" >> "$GITHUB_ENV"

          echo "Waiting for app on ports (timeout: 10m)..."
          for i in $(seq 1 120); do
            ports_ok=true
            if [ -n "$CF_KEY" ]; then
              for p in "${PORT_ARR[@]}"; do
                [ -z "$p" ] && continue
                if ! curl -sf "http://localhost:${p}" > /dev/null 2>&1; then
                  ports_ok=false
                  break
                fi
              done
            else
              if ! curl -sf "http://localhost:${PRIMARY_PORT}" > /dev/null 2>&1; then
                ports_ok=false
              fi
            fi

            if [ "$ports_ok" = "true" ]; then
              echo "App ports are up and live after $((i * 5))s"
              APP_READY=true
              break
            fi

            if ! kill -0 "$APP_PID" 2>/dev/null; then
              echo "::error::App process died during startup"
              break
            fi
            sleep 5
          done

          # Stop tailing startup logs
          kill "$TAIL_PID" 2>/dev/null || true

          if [ -z "${APP_READY}" ]; then
            echo "::error::App did not respond on configured ports within 10 minutes"
            exit 1
          fi

      # --- 8b. After-start script (runs once after the app is healthy) ---
      - name: Run after-start script
        if: env.AFTER_START != ''
        working-directory: project
        run: |
          echo "Running after-start script..."
          sh -c "$AFTER_START"
      # --- 9. Start Cloudflare tunnels (one per port) and public DB tunnel ---
      - name: Start Cloudflare quick tunnels
        env:
          CF_KEY: ${{ inputs.cf_workers_key }}
        run: |
          IFS=',' read -ra PORT_ARR <<< "$PORTS"
          PORT_ARR=("${PORT_ARR[@]:0:5}")

          : > /tmp/tunnels.env          # one "port=pid=url" line per tunnel
          TUNNELS_JSON="[]"

          if [ -n "$CF_KEY" ]; then
            echo "Starting Cloudflare persistent named tunnel..."
            nohup cloudflared tunnel run --token "$CF_KEY" --no-autoupdate > /tmp/tunnel_named.log 2>&1 &
            tpid=$!
            
            APP_API_URL=$(echo "${{ inputs.webhook_url }}" | sed 's|/webhook/update-link|/projects|')
            PROJECT_DATA=$(curl -sL \
              -H "x-internal-secret: ${{ inputs.webhook_secret }}" \
              "$APP_API_URL" | python3 -c "
            import json,sys
            d=json.load(sys.stdin)
            p=next((x for x in d.get('projects',[]) if str(x.get('_id',''))=='${{ inputs.project_id }}'),None)
            print(json.dumps(p) if p else '{}')
            " 2>/dev/null || echo '{}')
            
            for p in "${PORT_ARR[@]}"; do
              [ -z "$p" ] && continue
              domain=$(echo "$PROJECT_DATA" | python3 -c "
              import json,sys
              proj=json.load(sys.stdin)
              mappings=proj.get('portMappings', [])
              m=next((x for x in mappings if str(x.get('port',''))=='$p'), None)
              print(m.get('domain','') if m else '')
              " 2>/dev/null || true)
              
              if [ -n "$domain" ]; then
                url="https://${domain}"
              else
                url="https://pending-domain-setup"
              fi
              echo "${p}=${tpid}=${url}" >> /tmp/tunnels.env
              TUNNELS_JSON=$(echo "$TUNNELS_JSON" | jq -c --argjson port "$p" --arg url "$url" '. + [{port:$port, url:$url}]')
            done
          else
            echo "Starting Cloudflare quick tunnels..."
            for p in "${PORT_ARR[@]}"; do
              [ -z "$p" ] && continue
              logf="/tmp/tunnel_${p}.log"
              nohup cloudflared tunnel --url "http://localhost:${p}"                 --no-autoupdate > "$logf" 2>&1 &
              tpid=$!

              url=""
              for i in $(seq 1 30); do
                url=$(grep -oP 'https://[a-zA-Z0-9-]+\.[tT]ry[cC]loudflare\.com' "$logf" | head -1 || true)
                [ -n "$url" ] && break
                sleep 3
              done

              if [ -z "$url" ]; then
                echo "::error::Could not obtain tunnel URL for port $p"
                cat "$logf"
                exit 1
              fi

              echo "Port $p -> $url"
              echo "${p}=${tpid}=${url}" >> /tmp/tunnels.env
              TUNNELS_JSON=$(echo "$TUNNELS_JSON" | jq -c --argjson port "$p" --arg url "$url" '. + [{port:$port, url:$url}]')
            done
          fi

          PRIMARY_URL=$(echo "$TUNNELS_JSON" | jq -r '.[0].url')
          {
            echo "TUNNELS_JSON=$TUNNELS_JSON"
            echo "TUNNEL_URL=$PRIMARY_URL"
          } >> "$GITHUB_ENV"
      # --- 10. Write project cache file ---
      - name: Write project cache
        env:
          PROJECT_ID: ${{ inputs.project_id }}
          RUN_ID: ${{ github.run_id }}
        run: |
          mkdir -p /tmp/cache
          cat > "/tmp/cache/${PROJECT_ID}.json" <<EOF
          {
            "project_id": "${PROJECT_ID}",
            "workflow_number": 10,
            "run_id": "${RUN_ID}",
            "tunnel_url": "${TUNNEL_URL}",
            "started_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

      - name: Save project cache
        uses: actions/cache/save@v4
        with:
          path: /tmp/cache
          key: project-cache-${{ inputs.project_id }}-${{ github.run_id }}

      # --- 11. Notify Vercel app - running ---
      - name: Notify webhook - running
        env:
          WEBHOOK_URL: ${{ inputs.webhook_url }}
          WEBHOOK_SECRET: ${{ inputs.webhook_secret }}
          PROJECT_ID: ${{ inputs.project_id }}
          RUN_ID: ${{ github.run_id }}
        run: |
          PAYLOAD=$(jq -n \
            --arg pid "$PROJECT_ID" \
            --arg url "$TUNNEL_URL" \
            --argjson tunnels "$TUNNELS_JSON" \
            --arg wf "10" \
            --arg rid "$RUN_ID" \
            '{project_id:$pid, tunnel_url:$url, tunnels:$tunnels, status:"running", workflow_number:$wf, run_id:$rid}')
          curl -fsSX POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "x-webhook-secret: $WEBHOOK_SECRET" \
            --data-binary "$PAYLOAD"

      # --- 12. Keep alive loop ---
      - name: Keep alive
        env:
          RUN_CMD: ${{ inputs.run_command }}
          WEBHOOK_URL: ${{ inputs.webhook_url }}
          WEBHOOK_SECRET: ${{ inputs.webhook_secret }}
          PROJECT_ID: ${{ inputs.project_id }}
          RUN_ID: ${{ github.run_id }}
          CF_KEY: ${{ inputs.cf_workers_key }}
        working-directory: project
        run: |
          PRIMARY_PORT=$(echo "$PORTS" | cut -d',' -f1)

          # Start tailing running logs in background with cleanup on exit
          touch /tmp/app.log
          tail -F /tmp/app.log &
          TAIL_PID=$!
          
          # Start background logging daemon
          nohup python3 -c "
          import time, urllib.request, json, os
          project_id = '$PROJECT_ID'
          webhook_secret = '$WEBHOOK_SECRET'
          api_url = '$WEBHOOK_URL'.replace('/webhook/update-link', f'/projects/{project_id}/internal/logs')
          
          while True:
              try:
                  with open('/tmp/app.log', 'r') as f:
                      lines = f.readlines()
                      log_content = ''.join(lines[-500:])
              except Exception as e:
                  log_content = 'Error reading logs: ' + str(e)
              
              try:
                  data = json.dumps({'logs': log_content}).encode('utf-8')
                  req = urllib.request.Request(api_url, data=data, method='POST')
                  req.add_header('Content-Type', 'application/json')
                  req.add_header('x-internal-secret', webhook_secret)
                  with urllib.request.urlopen(req, timeout=5) as r:
                      resp = json.loads(r.read().decode())
                      user_live = resp.get('userLive', False)
              except Exception as e:
                  user_live = False
              
              if user_live:
                  time.sleep(3)
              else:
                  time.sleep(60)
          " >/dev/null 2>&1 &
          LOGS_DAEMON_PID=$!
          
          trap "kill $TAIL_PID $LOGS_DAEMON_PID 2>/dev/null || true" EXIT

          rebuild_json() {
            local tj="[]"
            while IFS='=' read -r p tpid url; do
              [ -z "$p" ] && continue
              tj=$(echo "$tj" | jq -c --argjson port "$p" --arg url "$url" '. + [{port:$port, url:$url}]')
            done < /tmp/tunnels.env
            echo "$tj"
          }

          notify_running() {
            local tj="$1"
            local purl
            purl=$(echo "$tj" | jq -r '.[0].url')
            local payload
            payload=$(jq -n --arg pid "$PROJECT_ID" --arg url "$purl" --argjson tunnels "$tj" \
              --arg wf "1" --arg rid "$RUN_ID" \
              '{project_id:$pid, tunnel_url:$url, tunnels:$tunnels, status:"running", workflow_number:$wf, run_id:$rid}')
            curl -fsSX POST "$WEBHOOK_URL" -H "Content-Type: application/json" \
              -H "x-webhook-secret: $WEBHOOK_SECRET" --data-binary "$payload" || true
          }

          RESTARTS=0
          while true; do
            sleep 30

            if ! kill -0 "$APP_PID" 2>/dev/null; then
              echo "App process died - restarting (restart #$((++RESTARTS)))..."
              nohup sh -c "$RUN_CMD" > /tmp/app.log 2>&1 &
              APP_PID=$!
              for i in $(seq 1 30); do
                curl -sf "http://localhost:${PRIMARY_PORT}" > /dev/null 2>&1 && { echo "App restarted"; break; }
                sleep 5
              done
            fi

            changed=0
            tmpfile=$(mktemp)
            while IFS='=' read -r p tpid url; do
              [ -z "$p" ] && continue
              if ! kill -0 "$tpid" 2>/dev/null; then
                echo "Tunnel for port $p died - restarting..."
                if [ -n "$CF_KEY" ]; then
                  nohup cloudflared tunnel run --token "$CF_KEY" --no-autoupdate > /tmp/tunnel_named.log 2>&1 &
                  tpid=$!
                else
                  logf="/tmp/tunnel_${p}.log"
                  nohup cloudflared tunnel --url "http://localhost:${p}" --no-autoupdate > "$logf" 2>&1 &
                  tpid=$!
                  sleep 10
                  newurl=$(grep -oP 'https://[a-zA-Z0-9-]+\.[tT]ry[cC]loudflare\.com' "$logf" | head -1 || true)
                  [ -n "$newurl" ] && { url="$newurl"; changed=1; }
                fi
              fi
              echo "${p}=${tpid}=${url}" >> "$tmpfile"
            done < /tmp/tunnels.env
            mv "$tmpfile" /tmp/tunnels.env

            if [ "$changed" = "1" ]; then
              echo "Tunnel URL(s) changed - notifying webhook"
              notify_running "$(rebuild_json)"
            fi
          done      # --- 12b. After-stop script (teardown, best-effort) ---
      - name: Run after-stop script
        if: always() && env.AFTER_STOP != ''
        working-directory: project
        run: |
          echo "Running after-stop script..."
          sh -c "$AFTER_STOP" || true

      # --- 13. Notify Vercel app - stopped (always runs) ---
      - name: Notify webhook - stopped
        if: always()
        env:
          WEBHOOK_URL: ${{ inputs.webhook_url }}
          WEBHOOK_SECRET: ${{ inputs.webhook_secret }}
          PROJECT_ID: ${{ inputs.project_id }}
          RUN_ID: ${{ github.run_id }}
        run: |
          STATUS="stopped"
          if [ "${{ job.status }}" = "failure" ]; then
            STATUS="failed"
          fi
          curl -fsSX POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "x-webhook-secret: $WEBHOOK_SECRET" \
            -d "{
              \"project_id\": \"$PROJECT_ID\",
              \"status\": \"$STATUS\",
              \"workflow_number\": \"10\",
              \"run_id\": \"$RUN_ID\"
            }" || true