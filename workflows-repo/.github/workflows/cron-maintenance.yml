name: "Cron Maintenance"

on:
  workflow_dispatch: {}

env:
  VERCEL_APP_URL: ${{ secrets.VERCEL_APP_URL }}
  WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
  GH_TOKEN: ${{ secrets.GH_PAT_WORKFLOWS }}
  REPO_OWNER: ${{ github.repository_owner }}
  REPO_NAME: ${{ github.event.repository.name }}
  TOTAL_SERVERS: 12

jobs:
  cron-maintenance:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Normalize secrets (strip stray newlines/whitespace)
        run: |
          {
            echo "GH_TOKEN=$(printf '%s' "$GH_TOKEN" | tr -d '[:space:]')"
            echo "WEBHOOK_SECRET=$(printf '%s' "$WEBHOOK_SECRET" | tr -d '[:space:]')"
            echo "VERCEL_APP_URL=$(printf '%s' "$VERCEL_APP_URL" | tr -d '[:space:]')"
          } >> "$GITHUB_ENV"

      - name: Fetch all running projects
        id: fetch
        run: |
          RESPONSE=$(curl -sL \
            -H "x-internal-secret: $WEBHOOK_SECRET" \
            "${VERCEL_APP_URL}/api/projects" || echo '{"projects":[]}')
          echo "$RESPONSE" > /tmp/projects.json
          COUNT=$(python3 -c "
          import json
          with open('/tmp/projects.json') as f: d=json.load(f)
          print(len([p for p in d.get('projects',[]) if p.get('status') in ('running','deploying')]))
          " 2>/dev/null || echo 0)
          echo "Active projects: $COUNT"
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Rotate projects to fresh server workflows
        if: steps.fetch.outputs.count != '0'
        run: |
          python3 << 'PYEOF'
          import json, subprocess, random, os, base64

          VERCEL  = os.environ["VERCEL_APP_URL"]
          SECRET  = os.environ["WEBHOOK_SECRET"]
          TOKEN   = os.environ["GH_TOKEN"]
          OWNER   = os.environ["REPO_OWNER"]
          REPO    = os.environ["REPO_NAME"]
          SERVERS = int(os.environ["TOTAL_SERVERS"])

          # Only rotate projects that are actually live. A "deploying" project is
          # already getting a fresh server, so re-dispatching it would stampede.
          with open("/tmp/projects.json") as f:
              projects = [p for p in json.load(f).get("projects", [])
                          if p.get("status") == "running"]

          print(f"Rotating {len(projects)} running projects", flush=True)

          for proj in projects:
              pid    = str(proj["_id"])
              cur_wf = proj.get("activeWorkflow")

              # Pull the full project (PAT + envVars) from the internal endpoint.
              r = subprocess.run(
                  ["curl", "-sL", "-H", f"x-internal-secret: {SECRET}",
                   f"{VERCEL}/api/projects/{pid}/internal"],
                  capture_output=True, text=True)
              try:
                  full = json.loads(r.stdout).get("project", {})
              except Exception:
                  print(f"  {pid}: could not fetch full data, skipping", flush=True)
                  continue

              repo_url = full.get("repoUrl", "")
              if not repo_url:
                  print(f"  {pid}: missing repoUrl, skipping", flush=True)
                  continue

              pat        = full.get("pat", "")
              run_cmd    = full.get("runCommand", "pnpm dev")
              ports_list = full.get("ports") or [full.get("port", 3000)]
              ports      = ",".join(str(p) for p in ports_list)
              cf_key     = full.get("cfWorkersKey", "") or ""
              env_vars = full.get("envVars", [])
              env_b64  = base64.b64encode(
                  "\n".join(f"{v['key']}={v['value']}" for v in env_vars if v.get("key")).encode()
              ).decode()
              after_b64 = base64.b64encode(json.dumps({
                  "start": full.get("afterStartScript", "") or "",
                  "stop":  full.get("afterStopScript", "") or "",
              }).encode()).decode()

              available = [n for n in range(1, SERVERS+1) if n != cur_wf] or list(range(1, SERVERS+1))
              new_wf = random.choice(available)
              print(f"  {pid}: server {cur_wf} → server {new_wf}", flush=True)

              payload = json.dumps({
                  "ref": "main",
                  "inputs": {
                      "project_id":     pid,
                      "repo_url":       repo_url,
                      "pat":            pat,
                      "env_b64":        env_b64,
                      "run_command":    run_cmd,
                      "ports":          ports,
                      "webhook_url":    f"{VERCEL}/api/webhook/update-link",
                      "webhook_secret": SECRET,
                      "cf_workers_key": cf_key,
                      "after_b64":      after_b64,
                  }
              })

              with open("/tmp/cron_payload.json", "w") as f:
                  f.write(payload)

              # Dispatch the new server and move on. We do NOT poll or cancel here:
              # the new server reports "running" to the Vercel webhook, which then
              # cancels the previous run (make-before-break). If the new server
              # never comes up, the old one keeps serving and the next cron retries.
              r2 = subprocess.run(
                  ["curl", "-s", "-o", "/dev/null", "-w", "%{http_code}", "-X", "POST",
                   f"https://api.github.com/repos/{OWNER}/{REPO}/actions/workflows/server-{new_wf}.yml/dispatches",
                   "-H", f"Authorization: Bearer {TOKEN}",
                   "-H", "Accept: application/vnd.github+json",
                   "-H", "X-GitHub-Api-Version: 2022-11-28",
                   "-H", "Content-Type: application/json",
                   "--data-binary", "@/tmp/cron_payload.json"],
                  capture_output=True, text=True)
              code = r2.stdout.strip()
              if code == "204":
                  print(f"  Dispatched server-{new_wf}; app will cut over and cancel the old run when it reports running.", flush=True)
              else:
                  print(f"  Failed to dispatch server-{new_wf}: HTTP {code} — keeping current server", flush=True)

          print("Cron maintenance done", flush=True)
          PYEOF

      - name: Summary
        if: always()
        run: |
          echo "## Cron Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- Ran at: $(date -u)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Projects: ${{ steps.fetch.outputs.count }}" >> "$GITHUB_STEP_SUMMARY"
