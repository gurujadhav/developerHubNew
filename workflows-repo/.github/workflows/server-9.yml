name: "Server 9"

on:
  workflow_dispatch:
    inputs:
      project_id:
        description: "MongoDB project ID"
        required: true
        type: string
      repo_url:
        description: "GitHub repository URL (https://github.com/owner/repo)"
        required: true
        type: string
      pat:
        description: "GitHub PAT with repo read access"
        required: true
        type: string
      env_b64:
        description: "Base64-encoded .env file content"
        required: false
        default: ""
        type: string
      run_command:
        description: "Command to start the app (single command only)"
        required: false
        default: "pnpm dev"
        type: string
      port:
        description: "Port the app listens on"
        required: false
        default: "3000"
        type: string
      webhook_url:
        description: "Vercel app webhook URL for status updates"
        required: true
        type: string
      webhook_secret:
        description: "Shared secret for webhook authentication"
        required: true
        type: string
      cf_workers_key:
        description: "Cloudflare Workers API token (optional — uses shared tunnel if empty)"
        required: false
        default: ""
        type: string

jobs:
  serve:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      # ── 1. Install cloudflared ────────────────────────────────────────────────
      - name: Install cloudflared
        run: |
          curl -fsSL https://pkg.cloudflare.com/cloudflare-main.gpg \
            | sudo gpg --dearmor -o /usr/share/keyrings/cloudflare-main.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-main.gpg] https://pkg.cloudflare.com/cloudflared focal main" \
            | sudo tee /etc/apt/sources.list.d/cloudflared.list
          sudo apt-get update -q && sudo apt-get install -y cloudflared
          cloudflared --version

      # ── 2. Node.js ───────────────────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ── 3. pnpm ──────────────────────────────────────────────────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest
          run_install: false

      # ── 4. Clone user repo ───────────────────────────────────────────────────
      - name: Clone repository
        env:
          PAT: ${{ inputs.pat }}
          REPO_URL: ${{ inputs.repo_url }}
        run: |
          # Strip scheme and embed PAT
          REPO_CLEAN=$(echo "$REPO_URL" | sed 's|https://||')
          git clone --depth 1 "https://${PAT}@${REPO_CLEAN}" project
          echo "Cloned $REPO_URL"

      # ── 5. Restore node_modules cache ────────────────────────────────────────
      - name: Restore node_modules cache
        id: nm-cache
        uses: actions/cache@v4
        with:
          path: project/node_modules
          key: nm-${{ inputs.project_id }}-${{ hashFiles('project/pnpm-lock.yaml', 'project/package-lock.json', 'project/yarn.lock') }}
          restore-keys: nm-${{ inputs.project_id }}-

      # ── 6. Write .env file ───────────────────────────────────────────────────
      - name: Write .env file
        if: inputs.env_b64 != ''
        env:
          ENV_B64: ${{ inputs.env_b64 }}
        run: |
          echo "$ENV_B64" | base64 -d > project/.env
          echo ".env written ($(wc -l < project/.env) lines)"

      # ── 7. Install dependencies ──────────────────────────────────────────────
      - name: Install dependencies
        working-directory: project
        run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile || pnpm install
          elif [ -f package-lock.json ]; then
            npm ci || npm install
          else
            pnpm install
          fi

      # ── 8. Start the application ─────────────────────────────────────────────
      - name: Start application
        working-directory: project
        env:
          PORT: ${{ inputs.port }}
          RUN_CMD: ${{ inputs.run_command }}
        run: |
          nohup sh -c "$RUN_CMD" > /tmp/app.log 2>&1 &
          APP_PID=$!
          echo "APP_PID=$APP_PID" >> "$GITHUB_ENV"

          echo "Waiting for app on port $PORT..."
          for i in $(seq 1 60); do
            if curl -sf "http://localhost:${PORT}" > /dev/null 2>&1; then
              echo "App is up after ${i}× 5 s"
              echo "APP_READY=true" >> "$GITHUB_ENV"
              break
            fi
            sleep 5
          done

          if [ -z "${APP_READY}" ]; then
            echo "::error::App did not respond on port $PORT within 5 minutes"
            cat /tmp/app.log | tail -50
            exit 1
          fi

      # ── 9. Start Cloudflare tunnel ───────────────────────────────────────────
      - name: Start Cloudflare quick tunnel
        env:
          PORT: ${{ inputs.port }}
        run: |
          nohup cloudflared tunnel --url "http://localhost:${PORT}" \
            --no-autoupdate > /tmp/tunnel.log 2>&1 &
          TUNNEL_PID=$!
          echo "TUNNEL_PID=$TUNNEL_PID" >> "$GITHUB_ENV"

          echo "Waiting for tunnel URL..."
          TUNNEL_URL=""
          for i in $(seq 1 30); do
            TUNNEL_URL=$(grep -oP 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' /tmp/tunnel.log | head -1 || true)
            if [ -n "$TUNNEL_URL" ]; then
              echo "Tunnel URL: $TUNNEL_URL"
              echo "TUNNEL_URL=$TUNNEL_URL" >> "$GITHUB_ENV"
              break
            fi
            sleep 3
          done

          if [ -z "$TUNNEL_URL" ]; then
            echo "::error::Could not obtain cloudflared tunnel URL"
            cat /tmp/tunnel.log
            exit 1
          fi

      # ── 10. Write project cache file ─────────────────────────────────────────
      - name: Write project cache
        env:
          PROJECT_ID: ${{ inputs.project_id }}
          RUN_ID: ${{ github.run_id }}
        run: |
          mkdir -p /tmp/cache
          cat > "/tmp/cache/${PROJECT_ID}.json" <<EOF
          {
            "project_id": "${PROJECT_ID}",
            "workflow_number": 9,
            "run_id": "${RUN_ID}",
            "tunnel_url": "${TUNNEL_URL}",
            "started_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

      - name: Save project cache
        uses: actions/cache/save@v4
        with:
          path: /tmp/cache
          key: project-cache-${{ inputs.project_id }}-${{ github.run_id }}

      # ── 11. Notify Vercel app — running ──────────────────────────────────────
      - name: Notify webhook — running
        env:
          WEBHOOK_URL: ${{ inputs.webhook_url }}
          WEBHOOK_SECRET: ${{ inputs.webhook_secret }}
          PROJECT_ID: ${{ inputs.project_id }}
          RUN_ID: ${{ github.run_id }}
        run: |
          curl -fsSX POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "x-webhook-secret: $WEBHOOK_SECRET" \
            -d "{
              \"project_id\": \"$PROJECT_ID\",
              \"tunnel_url\": \"$TUNNEL_URL\",
              \"status\": \"running\",
              \"workflow_number\": \"1\",
              \"run_id\": \"$RUN_ID\"
            }"

      # ── 12. Keep alive loop ──────────────────────────────────────────────────
      - name: Keep alive
        env:
          PORT: ${{ inputs.port }}
          RUN_CMD: ${{ inputs.run_command }}
          WEBHOOK_URL: ${{ inputs.webhook_url }}
          WEBHOOK_SECRET: ${{ inputs.webhook_secret }}
          PROJECT_ID: ${{ inputs.project_id }}
        working-directory: project
        run: |
          RESTARTS=0
          while true; do
            sleep 30

            # Check app process
            if ! kill -0 "$APP_PID" 2>/dev/null; then
              echo "App process died — restarting (restart #$((++RESTARTS)))..."
              nohup sh -c "$RUN_CMD" > /tmp/app.log 2>&1 &
              APP_PID=$!

              # Wait for it to come back
              for i in $(seq 1 30); do
                if curl -sf "http://localhost:${PORT}" > /dev/null 2>&1; then
                  echo "App restarted successfully"
                  break
                fi
                sleep 5
              done
            fi

            # Check tunnel process
            if ! kill -0 "$TUNNEL_PID" 2>/dev/null; then
              echo "Tunnel died — restarting tunnel..."
              nohup cloudflared tunnel --url "http://localhost:${PORT}" \
                --no-autoupdate > /tmp/tunnel.log 2>&1 &
              TUNNEL_PID=$!

              # Re-extract URL and notify
              sleep 10
              NEW_URL=$(grep -oP 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' /tmp/tunnel.log | head -1 || true)
              if [ -n "$NEW_URL" ] && [ "$NEW_URL" != "$TUNNEL_URL" ]; then
                TUNNEL_URL=$NEW_URL
                curl -fsSX POST "$WEBHOOK_URL" \
                  -H "Content-Type: application/json" \
                  -H "x-webhook-secret: $WEBHOOK_SECRET" \
                  -d "{\"project_id\":\"$PROJECT_ID\",\"tunnel_url\":\"$TUNNEL_URL\",\"status\":\"running\",\"workflow_number\":\"1\",\"run_id\":\"$GITHUB_RUN_ID\"}"
              fi
            fi
          done

      # ── 13. Notify Vercel app — stopped (always runs) ────────────────────────
      - name: Notify webhook — stopped
        if: always()
        env:
          WEBHOOK_URL: ${{ inputs.webhook_url }}
          WEBHOOK_SECRET: ${{ inputs.webhook_secret }}
          PROJECT_ID: ${{ inputs.project_id }}
          RUN_ID: ${{ github.run_id }}
        run: |
          STATUS="stopped"
          if [ "${{ job.status }}" = "failure" ]; then
            STATUS="failed"
          fi
          curl -fsSX POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "x-webhook-secret: $WEBHOOK_SECRET" \
            -d "{
              \"project_id\": \"$PROJECT_ID\",
              \"status\": \"$STATUS\",
              \"workflow_number\": \"1\",
              \"run_id\": \"$RUN_ID\"
            }" || true
