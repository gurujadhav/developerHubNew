name: "Master Orchestrator"

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Action: deploy_new"
        required: true
        type: choice
        options:
          - deploy_new
      project_id:
        description: "MongoDB project ID"
        required: true
        type: string
      repo_url:
        description: "GitHub repository URL"
        required: true
        type: string
      pat:
        description: "GitHub PAT (empty for public repos)"
        required: false
        default: ""
        type: string
      env_b64:
        description: "Base64-encoded .env content"
        required: false
        default: ""
        type: string
      run_command:
        description: "Start command"
        required: false
        default: "pnpm dev"
        type: string
      port:
        description: "App port"
        required: false
        default: "3000"
        type: string
      cf_workers_key:
        description: "Cloudflare Workers API token (optional)"
        required: false
        default: ""
        type: string

  schedule:
    - cron: "0 */3 * * *"

env:
  VERCEL_APP_URL: ${{ secrets.VERCEL_APP_URL }}
  WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
  GH_TOKEN: ${{ secrets.GH_PAT_WORKFLOWS }}
  REPO_OWNER: ${{ github.repository_owner }}
  REPO_NAME: ${{ github.event.repository.name }}
  TOTAL_SERVERS: 12

jobs:
  # ── Deploy a new project ────────────────────────────────────────────────────
  deploy-new:
    if: github.event_name == 'workflow_dispatch' && inputs.action == 'deploy_new'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Normalize secrets (strip stray newlines/whitespace)
        run: |
          # Secrets pasted with a trailing newline corrupt header values
          # (e.g. "Authorization: Bearer <token>\n"), which breaks request
          # framing and yields "Problems parsing JSON". Trim them once here.
          {
            echo "GH_TOKEN=$(printf '%s' "$GH_TOKEN" | tr -d '[:space:]')"
            echo "WEBHOOK_SECRET=$(printf '%s' "$WEBHOOK_SECRET" | tr -d '[:space:]')"
            echo "VERCEL_APP_URL=$(printf '%s' "$VERCEL_APP_URL" | tr -d '[:space:]')"
          } >> "$GITHUB_ENV"

      - name: Pick least-loaded server workflow
        id: pick-server
        run: |
          RESPONSE=$(curl -sL \
            -H "x-internal-secret: $WEBHOOK_SECRET" \
            "$VERCEL_APP_URL/api/projects" || echo '{"projects":[]}')

          declare -A SERVER_COUNT
          for i in $(seq 1 $TOTAL_SERVERS); do SERVER_COUNT[$i]=0; done

          ACTIVE=$(echo "$RESPONSE" | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          print(' '.join(str(p.get('activeWorkflow','')) for p in d.get('projects',[]) if p.get('activeWorkflow')))
          " 2>/dev/null || true)

          for w in $ACTIVE; do
            [[ "$w" =~ ^[0-9]+$ ]] && [ "$w" -ge 1 ] && [ "$w" -le $TOTAL_SERVERS ] \
              && SERVER_COUNT[$w]=$((${SERVER_COUNT[$w]}+1))
          done

          MIN=9999; CHOSEN=1
          for i in $(seq 1 $TOTAL_SERVERS); do
            [ "${SERVER_COUNT[$i]}" -lt "$MIN" ] && MIN="${SERVER_COUNT[$i]}" && CHOSEN=$i
          done

          echo "Chosen server: $CHOSEN (load: ${SERVER_COUNT[$CHOSEN]})"
          echo "server_number=$CHOSEN" >> "$GITHUB_OUTPUT"

      - name: Trigger server workflow
        env:
          SERVER_NUM: ${{ steps.pick-server.outputs.server_number }}
          PROJECT_ID: ${{ inputs.project_id }}
          REPO_URL: ${{ inputs.repo_url }}
          PAT: ${{ inputs.pat }}
          ENV_B64: ${{ inputs.env_b64 }}
          RUN_CMD: ${{ inputs.run_command }}
          PORT: ${{ inputs.port }}
          CF_KEY: ${{ inputs.cf_workers_key }}
        run: |
          echo "Triggering server-${SERVER_NUM}.yml for project ${PROJECT_ID}..."

          # Use jq to safely build JSON — handles all special characters correctly
          jq -n \
            --arg ref       "main" \
            --arg pid       "$PROJECT_ID" \
            --arg repo_url  "$REPO_URL" \
            --arg pat       "$PAT" \
            --arg env_b64   "$ENV_B64" \
            --arg run_cmd   "$RUN_CMD" \
            --arg port      "$PORT" \
            --arg wh_url    "${VERCEL_APP_URL}/api/webhook/update-link" \
            --arg wh_secret "$WEBHOOK_SECRET" \
            --arg cf_key    "${CF_KEY:-}" \
            '{
              ref: $ref,
              inputs: {
                project_id:     $pid,
                repo_url:       $repo_url,
                pat:            $pat,
                env_b64:        $env_b64,
                run_command:    $run_cmd,
                port:           $port,
                webhook_url:    $wh_url,
                webhook_secret: $wh_secret,
                cf_workers_key: $cf_key
              }
            }' > /tmp/payload.json

          echo "Payload built (secrets redacted):"
          jq 'del(.inputs.pat, .inputs.webhook_secret) | .inputs.env_b64 = "***"' /tmp/payload.json

          HTTP_STATUS=$(curl -s -o /tmp/gh_resp.json -w "%{http_code}" -X POST \
            "https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/actions/workflows/server-${SERVER_NUM}.yml/dispatches" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/json" \
            --data-binary @/tmp/payload.json)

          echo "GitHub API status: $HTTP_STATUS"
          echo "GitHub API response:"
          cat /tmp/gh_resp.json

          if [[ "$HTTP_STATUS" != "204" ]]; then
            echo "::error::Failed to trigger server-${SERVER_NUM}.yml (HTTP $HTTP_STATUS)"
            curl -s -X POST "${VERCEL_APP_URL}/api/webhook/update-link" \
              -H "Content-Type: application/json" \
              -H "x-webhook-secret: $WEBHOOK_SECRET" \
              --data-binary "$(jq -n \
                --arg pid "$PROJECT_ID" \
                --arg reason "Could not trigger server-${SERVER_NUM} (HTTP $HTTP_STATUS)" \
                '{project_id:$pid, status:"failed", failure_reason:$reason}')" || true
            exit 1
          fi

          echo "server-${SERVER_NUM}.yml triggered successfully"

      - name: Poll for running status
        env:
          PROJECT_ID: ${{ inputs.project_id }}
        run: |
          echo "Polling for project to reach 'running'..."
          for i in $(seq 1 60); do
            sleep 10
            STATUS=$(curl -sL \
              -H "x-internal-secret: $WEBHOOK_SECRET" \
              "${VERCEL_APP_URL}/api/projects" \
              | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          p=next((x for x in d.get('projects',[]) if str(x.get('_id',''))=='$PROJECT_ID'),None)
          print(p.get('status','unknown') if p else 'not_found')
          " 2>/dev/null || echo "error")

            echo "Poll $i/60 — status: $STATUS"
            [ "$STATUS" = "running" ] && echo "Project is running!" && exit 0
            [ "$STATUS" = "failed"  ] && echo "::error::Project failed" && exit 1
          done
          echo "::warning::Timed out — server workflow may still be starting"

  # ── Cron maintenance ────────────────────────────────────────────────────────
  cron-maintenance:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Normalize secrets (strip stray newlines/whitespace)
        run: |
          {
            echo "GH_TOKEN=$(printf '%s' "$GH_TOKEN" | tr -d '[:space:]')"
            echo "WEBHOOK_SECRET=$(printf '%s' "$WEBHOOK_SECRET" | tr -d '[:space:]')"
            echo "VERCEL_APP_URL=$(printf '%s' "$VERCEL_APP_URL" | tr -d '[:space:]')"
          } >> "$GITHUB_ENV"

      - name: Fetch all running projects
        id: fetch
        run: |
          RESPONSE=$(curl -sL \
            -H "x-internal-secret: $WEBHOOK_SECRET" \
            "${VERCEL_APP_URL}/api/projects" || echo '{"projects":[]}')
          echo "$RESPONSE" > /tmp/projects.json
          COUNT=$(python3 -c "
          import json
          with open('/tmp/projects.json') as f: d=json.load(f)
          print(len([p for p in d.get('projects',[]) if p.get('status') in ('running','deploying')]))
          " 2>/dev/null || echo 0)
          echo "Active projects: $COUNT"
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Rotate projects to fresh server workflows
        if: steps.fetch.outputs.count != '0'
        run: |
          python3 << 'PYEOF'
          import json, subprocess, random, time, os, base64

          VERCEL  = os.environ["VERCEL_APP_URL"]
          SECRET  = os.environ["WEBHOOK_SECRET"]
          TOKEN   = os.environ["GH_TOKEN"]
          OWNER   = os.environ["REPO_OWNER"]
          REPO    = os.environ["REPO_NAME"]
          SERVERS = int(os.environ["TOTAL_SERVERS"])

          with open("/tmp/projects.json") as f:
              projects = [p for p in json.load(f).get("projects", [])
                          if p.get("status") in ("running", "deploying")]

          print(f"Rotating {len(projects)} projects")

          for proj in projects:
              pid        = str(proj["_id"])
              cur_wf     = proj.get("activeWorkflow")
              cur_run_id = proj.get("activeWorkflowRunId")

              r = subprocess.run(
                  ["curl", "-sL", "-H", f"x-internal-secret: {SECRET}",
                   f"{VERCEL}/api/projects/{pid}/internal"],
                  capture_output=True, text=True)
              try:
                  full = json.loads(r.stdout).get("project", {})
              except Exception:
                  print(f"  {pid}: could not fetch full data, skipping")
                  continue

              pat      = full.get("pat", "")
              repo_url = full.get("repoUrl", "")
              # PAT may be empty for public repos — only repo_url is required.
              if not repo_url:
                  print(f"  {pid}: missing repoUrl, skipping")
                  continue

              run_cmd  = full.get("runCommand", "pnpm dev")
              port     = str(full.get("port", 3000))
              cf_key   = full.get("cfWorkersKey", "") or ""
              env_vars = full.get("envVars", [])
              env_b64  = base64.b64encode(
                  "\n".join(f"{v['key']}={v['value']}" for v in env_vars if v.get("key")).encode()
              ).decode()

              available = [n for n in range(1, SERVERS+1) if n != cur_wf] or list(range(1, SERVERS+1))
              new_wf = random.choice(available)
              print(f"  {pid}: server {cur_wf} → server {new_wf}")

              payload = json.dumps({
                  "ref": "main",
                  "inputs": {
                      "project_id":     pid,
                      "repo_url":       repo_url,
                      "pat":            pat,
                      "env_b64":        env_b64,
                      "run_command":    run_cmd,
                      "port":           port,
                      "webhook_url":    f"{VERCEL}/api/webhook/update-link",
                      "webhook_secret": SECRET,
                      "cf_workers_key": cf_key,
                  }
              })

              with open("/tmp/cron_payload.json", "w") as f:
                  f.write(payload)

              r2 = subprocess.run(
                  ["curl", "-s", "-o", "/dev/null", "-w", "%{http_code}", "-X", "POST",
                   f"https://api.github.com/repos/{OWNER}/{REPO}/actions/workflows/server-{new_wf}.yml/dispatches",
                   "-H", f"Authorization: Bearer {TOKEN}",
                   "-H", "Accept: application/vnd.github+json",
                   "-H", "X-GitHub-Api-Version: 2022-11-28",
                   "-H", "Content-Type: application/json",
                   "--data-binary", "@/tmp/cron_payload.json"],
                  capture_output=True, text=True)
              print(f"  Triggered server-{new_wf}: HTTP {r2.stdout.strip()}")

              if r2.stdout.strip() != "204":
                  print(f"  Failed — keeping old workflow")
                  continue

              print(f"  Waiting 3 min for server-{new_wf} to start...")
              time.sleep(180)

              r3 = subprocess.run(
                  ["curl", "-sL", "-H", f"x-internal-secret: {SECRET}", f"{VERCEL}/api/projects"],
                  capture_output=True, text=True)
              try:
                  updated = next((p for p in json.loads(r3.stdout).get("projects", [])
                                  if str(p["_id"]) == pid), None)
                  new_status = updated.get("status") if updated else "unknown"
                  new_active = updated.get("activeWorkflow") if updated else None
              except Exception:
                  new_status, new_active = "unknown", None

              print(f"  Status: {new_status}, active workflow: {new_active}")

              if new_status == "running" and new_active == new_wf:
                  if cur_run_id:
                      r4 = subprocess.run(
                          ["curl", "-s", "-o", "/dev/null", "-w", "%{http_code}", "-X", "POST",
                           f"https://api.github.com/repos/{OWNER}/{REPO}/actions/runs/{cur_run_id}/cancel",
                           "-H", f"Authorization: Bearer {TOKEN}",
                           "-H", "Accept: application/vnd.github+json",
                           "-H", "X-GitHub-Api-Version: 2022-11-28"],
                          capture_output=True, text=True)
                      print(f"  Cancelled old run {cur_run_id}: HTTP {r4.stdout.strip()}")
              else:
                  print(f"  New workflow not confirmed — keeping old one running")

              time.sleep(5)

          print("Cron maintenance done")
          PYEOF

      - name: Summary
        if: always()
        run: |
          echo "## Cron Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- Ran at: $(date -u)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Projects: ${{ steps.fetch.outputs.count }}" >> "$GITHUB_STEP_SUMMARY"