name: "Sync server workflows → developerHubServer"

# Pushes the workflow definitions kept under workflows-repo/.github/workflows/
# into the deploy-target repo (developerHub1/developerHubServer) so that the
# platform and its runner workflows stay in sync.
#
# Runs automatically when those files change on main, and can also be triggered
# manually from the Actions tab ("Run workflow").
#
# Requires a repo secret named WORKFLOWS_SYNC_PAT — a classic PAT owned by the
# same user, with `repo` + `workflow` scopes (workflow scope is mandatory to
# write files under .github/workflows/ in the target repo).

on:
  push:
    branches: [main]
    paths:
      - "workflows-repo/.github/workflows/**"
  workflow_dispatch:

env:
  TARGET_OWNER: developerHub1
  TARGET_REPO: developerHubServer
  TARGET_BRANCH: main
  SOURCE_DIR: workflows-repo/.github/workflows

jobs:
  sync:
    runs-on: ubuntu-latest
    # Only the upstream repo syncs to the target. Forks (any other owner/repo)
    # skip this entirely — no auto-run on push and nothing on manual dispatch.
    if: github.repository == 'developerHub1/developerHub'
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Verify PAT secret is configured
        env:
          GH_TOKEN: ${{ secrets.WORKFLOWS_SYNC_PAT }}
        run: |
          if [ -z "${GH_TOKEN}" ]; then
            echo "::error::Secret WORKFLOWS_SYNC_PAT is not set. Add a classic PAT with repo + workflow scopes."
            exit 1
          fi

      - name: Sync workflow files to target repo
        env:
          GH_TOKEN: ${{ secrets.WORKFLOWS_SYNC_PAT }}
        run: |
          set -euo pipefail

          if [ ! -d "${SOURCE_DIR}" ]; then
            echo "::error::Source directory ${SOURCE_DIR} not found"
            exit 1
          fi

          # Strip any stray whitespace/newlines the secret may carry, then pass
          # the token via an auth header instead of embedding it in the URL.
          GH_TOKEN="$(printf '%s' "${GH_TOKEN}" | tr -d '[:space:]')"
          AUTH_HEADER="Authorization: Basic $(printf 'x-access-token:%s' "${GH_TOKEN}" | base64 -w0)"

          echo "Cloning ${TARGET_OWNER}/${TARGET_REPO} (branch ${TARGET_BRANCH})..."
          git -c http.extraheader="${AUTH_HEADER}" clone --depth 1 --branch "${TARGET_BRANCH}" \
            "https://github.com/${TARGET_OWNER}/${TARGET_REPO}.git" target

          mkdir -p target/.github/workflows

          # Mirror the source workflows into the target (propagates adds, edits,
          # and deletions/renames so the two stay identical).
          rsync -a --delete "${SOURCE_DIR}/" target/.github/workflows/

          cd target
          git config http.extraheader "${AUTH_HEADER}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows

          if git diff --cached --quiet; then
            echo "No workflow changes to sync — target is already up to date."
            exit 0
          fi

          git commit -m "chore: sync workflows from deployment-platform@${GITHUB_SHA::7}"
          git push origin "${TARGET_BRANCH}"
          echo "Workflows synced to ${TARGET_OWNER}/${TARGET_REPO}."

      - name: Summary
        if: always()
        run: |
          echo "## Workflow sync" >> "$GITHUB_STEP_SUMMARY"
          echo "- Target: \`${TARGET_OWNER}/${TARGET_REPO}\` (branch \`${TARGET_BRANCH}\`)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Source: \`${SOURCE_DIR}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Trigger: \`${{ github.event_name }}\`" >> "$GITHUB_STEP_SUMMARY"
